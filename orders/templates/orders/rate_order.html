{% extends 'orders/base.html' %}

{% block content %}
<h2>Оценить заказ: {{ order.title }}</h2>
<p>Исполнитель: {{ order.executor.username }}</p>
<p>Баллы: {{ order.points }}</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Поставить оценку</button>
</form>
{% endblock %}
